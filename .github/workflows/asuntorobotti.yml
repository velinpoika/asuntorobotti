name: Asuntorobotti

on:
  schedule:
    - cron: "0 5,7,9,11,13,15,17,19,21 * * *"
  workflow_dispatch:

jobs:
  tarkista-asunnot:
    runs-on: ubuntu-latest

    steps:
      - name: Hae koodi
        uses: actions/checkout@v4

      - name: Palauta seen.txt
        uses: actions/cache@v4
        with:
          path: seen.txt
          key: seen-asunnot-${{ runner.os }}
          restore-keys: seen-asunnot-

      - name: Asenna Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Asenna riippuvuudet
        run: pip install anthropic feedparser

      - name: Aja asuntorobotti
        env:
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_ADDRESS:        ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD:   ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_TO:             ${{ secrets.EMAIL_TO }}
        run: python asuntorobotti.py

      - name: Tallenna seen.txt
        uses: actions/cache/save@v4
        if: always()
        with:
          path: seen.txt
          key: seen-asunnot-${{ runner.os }}-${{ github.run_id }}
